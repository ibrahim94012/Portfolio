<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DevCard — Dynamic Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ══ THEMES (matched to TypeForge) ══ */
[data-theme="dark"]{
  --bg:#0a0a0f;--bg2:#0f0f1a;--bg3:#13131f;--panel:#16161f;--panel2:#1c1c28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#7fff6e;--accent2:#4ef0c0;--accent3:#ff6eb4;
  --text:#e8e8f0;--text2:#8888a8;--text3:#3e3e5a;
  --shadow:rgba(0,0,0,0.5);
  --modal-bg:rgba(0,0,0,0.75);--avatar-bg:#1c1c28;
  --glow1:rgba(127,255,110,0.05);--glow2:rgba(78,240,192,0.05);
  --grid-ln:rgba(127,255,110,0.025);
}
[data-theme="light"]{
  --bg:#f5f5f0;--bg2:#eeede8;--bg3:#e4e3dc;--panel:#ffffff;--panel2:#f0efe9;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --accent:#2e8b00;--accent2:#0a7a5c;--accent3:#c2185b;
  --text:#1a1a2e;--text2:#5a5a7a;--text3:#aaaabc;
  --shadow:rgba(0,0,0,0.12);
  --modal-bg:rgba(0,0,0,0.45);--avatar-bg:#e8e7e2;
  --glow1:rgba(46,139,0,0.04);--glow2:rgba(10,122,92,0.04);
  --grid-ln:rgba(46,139,0,0.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .35s,color .35s;padding-bottom:78px;}

/* ── BG ── */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--grid-ln) 1px,transparent 1px),linear-gradient(90deg,var(--grid-ln) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0;animation:gridPan 30s linear infinite;}
[data-theme="light"] .bg-grid{opacity:.6;}
@keyframes gridPan{to{background-position:36px 36px;}}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 55% 40% at 15% 10%,var(--glow1) 0%,transparent 65%),radial-gradient(ellipse 45% 35% at 85% 90%,var(--glow2) 0%,transparent 65%);}

.container{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:1.25rem 1rem 2rem;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.logo{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;letter-spacing:-.02em;}
.logo span{color:var(--accent);}
.icon-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--panel);cursor:pointer;transition:all .25s;color:var(--text2);font-size:.95rem;}
.icon-btn:hover{background:var(--panel2);color:var(--text);border-color:var(--accent);}
.header-right{display:flex;gap:8px;align-items:center;}

/* ── HERO / PROFILE CARD ── */
.hero{background:var(--panel);border:1.5px solid var(--border2);border-radius:20px;padding:1.75rem 1.5rem;margin-bottom:1.25rem;box-shadow:0 4px 24px var(--shadow);text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,var(--glow1),transparent);pointer-events:none;}
.avatar-wrap{width:96px;height:96px;border-radius:50%;margin:0 auto .9rem;border:3px solid var(--accent);overflow:hidden;background:var(--avatar-bg);display:flex;align-items:center;justify-content:center;position:relative;}
.avatar-wrap img{width:100%;height:100%;object-fit:cover;}
.avatar-wrap i{font-size:2.4rem;color:var(--text3);}
.hero-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:2px;}
.hero-role{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem;}
.hero-bio{font-size:.85rem;color:var(--text2);line-height:1.6;max-width:380px;margin:0 auto .9rem;}
.hero-socials{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
.social-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--panel2);color:var(--text2);transition:all .2s;text-decoration:none;font-size:.95rem;}
.social-btn:hover{color:var(--accent);border-color:var(--accent);transform:translateY(-2px);}

/* ── SECTION HEADERS ── */
.section-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
.section-title i{color:var(--accent);font-size:.95rem;}
section{margin-bottom:1.5rem;}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:.9rem .8rem;text-align:center;transition:border-color .3s;}
.stat-value{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--accent);line-height:1;}
.stat-label{font-family:'Space Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:5px;}

/* ── SKILLS ── */
.skills-wrap{display:flex;flex-wrap:wrap;gap:8px;}
.skill-chip{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.04em;background:var(--panel);border:1px solid var(--border2);border-radius:100px;padding:7px 14px;color:var(--text2);display:flex;align-items:center;gap:6px;transition:all .2s;}
.skill-chip:hover{border-color:var(--accent);color:var(--text);}
.skill-chip .lvl-bar{width:30px;height:4px;background:var(--panel2);border-radius:4px;overflow:hidden;}
.skill-chip .lvl-fill{height:100%;background:var(--accent);}

/* ── PROJECT CARDS ── */
.project-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;transition:border-color .25s,transform .25s;box-shadow:0 4px 16px var(--shadow);}
.project-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.project-img{width:100%;height:150px;object-fit:cover;background:var(--panel2);display:block;}
.project-img-placeholder{width:100%;height:150px;background:var(--panel2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:2rem;}
.project-body{padding:1rem 1.1rem;}
.project-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:4px;}
.project-desc{font-size:.8rem;color:var(--text2);line-height:1.55;margin-bottom:.7rem;}
.project-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.8rem;}
.project-tag{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.06em;background:var(--panel2);border:1px solid var(--border);border-radius:100px;padding:3px 10px;color:var(--text2);}
.project-links{display:flex;gap:8px;}
.proj-link{flex:1;text-align:center;font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;padding:8px;border-radius:100px;border:1px solid var(--border2);color:var(--text2);text-decoration:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.proj-link:hover{border-color:var(--accent);color:var(--accent);}
.proj-link.primary{background:var(--accent);color:#051200;border-color:var(--accent);font-weight:700;}
[data-theme="light"] .proj-link.primary{color:#fff;}

/* ── EXPERIENCE TIMELINE ── */
.timeline{position:relative;padding-left:24px;}
.timeline::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--border2);}
.tl-item{position:relative;margin-bottom:1.1rem;}
.tl-item::before{content:'';position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 0 2px var(--accent);}
.tl-role{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;}
.tl-org{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--accent2);margin-top:2px;}
.tl-date{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text3);margin-top:2px;letter-spacing:.06em;}
.tl-desc{font-size:.8rem;color:var(--text2);margin-top:5px;line-height:1.55;}

/* ── CONTACT ── */
.contact-form{background:var(--panel);border:1px solid var(--border2);border-radius:16px;padding:1.25rem;}
.form-group{margin-bottom:.8rem;}
.form-group label{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:6px;}
.form-group input,.form-group textarea{width:100%;background:var(--panel2);border:1.5px solid var(--border2);border-radius:12px;padding:.7rem .9rem;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);outline:none;transition:border-color .2s;resize:vertical;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);}
.btn{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.07em;text-transform:uppercase;padding:11px 22px;border-radius:100px;border:1px solid var(--accent);background:var(--accent);color:#051200;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-weight:700;}
[data-theme="light"] .btn{color:#fff;}
.btn:hover{box-shadow:0 0 20px rgba(127,255,110,.35);}
.btn.outline{background:transparent;color:var(--text2);border-color:var(--border2);}
.btn.outline:hover{color:var(--text);border-color:var(--accent);box-shadow:none;}
.btn.danger{background:#ff4e6a;border-color:#ff4e6a;color:#fff;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border2);display:flex;justify-content:space-around;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:200;backdrop-filter:blur(10px);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:color .2s;background:none;border:none;}
.nav-item i{font-size:1.1rem;}
.nav-item.active{color:var(--accent);}

/* ── MODAL (Admin/Login) ── */
.modal-overlay{position:fixed;inset:0;background:var(--modal-bg);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s;padding:1rem;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:20px;padding:1.5rem;max-width:380px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 12px 40px var(--shadow);}
.modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--text3);font-size:1.1rem;cursor:pointer;}

/* ── ADMIN EDIT BUTTONS ── */
.edit-fab{position:fixed;bottom:84px;right:16px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#051200;border:none;font-size:1.2rem;box-shadow:0 6px 20px rgba(127,255,110,.35);z-index:150;cursor:pointer;display:none;align-items:center;justify-content:center;}
[data-theme="light"] .edit-fab{color:#fff;}
.edit-fab.show{display:flex;}
.section-edit-btn{margin-left:auto;background:var(--panel2);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:50%;font-size:.7rem;cursor:pointer;display:none;align-items:center;justify-content:center;}
.admin-mode .section-edit-btn{display:flex;}
.admin-mode .section-title{display:flex;align-items:center;}

/* item action buttons shown in admin mode */
.item-actions{display:none;gap:6px;margin-top:8px;}
.admin-mode .item-actions{display:flex;}
.item-actions button{flex:1;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;padding:6px;border-radius:8px;border:1px solid var(--border2);background:var(--panel2);color:var(--text2);cursor:pointer;}
.item-actions button:hover{color:var(--text);border-color:var(--accent);}
.item-actions button.del:hover{color:#ff4e6a;border-color:#ff4e6a;}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--accent);border-radius:100px;padding:10px 22px;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--text);box-shadow:0 8px 24px var(--shadow);z-index:1100;opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── LOADING ── */
.loader{display:flex;align-items:center;justify-content:center;gap:8px;padding:2rem;color:var(--text3);font-family:'Space Mono',monospace;font-size:.7rem;}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:1.5rem;color:var(--text3);font-family:'Space Mono',monospace;font-size:.7rem;border:1px dashed var(--border2);border-radius:14px;}

/* fade in animation */
.fade-in{animation:fadeIn .5s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="logo">Dev<span>Card</span></div>
    <div class="header-right">
      <button class="icon-btn" onclick="toggleTheme()" title="Theme">
        <i class="fa-solid fa-circle-half-stroke"></i>
      </button>
      <button class="icon-btn" id="admin-login-btn" onclick="openAdminModal()" title="Admin">
        <i class="fa-solid fa-user-shield"></i>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero fade-in" id="hero-section">
    <div class="avatar-wrap" id="avatar-wrap"><i class="fa-solid fa-user"></i></div>
    <div class="hero-name" id="hero-name">লোড হচ্ছে...</div>
    <div class="hero-role" id="hero-role">—</div>
    <div class="hero-bio" id="hero-bio">—</div>
    <div class="hero-socials" id="hero-socials"></div>
    <div class="item-actions" style="max-width:240px;margin:.8rem auto 0;">
      <button onclick="openProfileEditModal()"><i class="fa-solid fa-pen"></i> এডিট প্রোফাইল</button>
    </div>
  </section>

  <!-- STATS -->
  <section class="fade-in">
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-value" id="stat-projects">0</div><div class="stat-label">Projects</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-skills">0</div><div class="stat-label">Skills</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-exp">0</div><div class="stat-label">Experience</div></div>
    </div>
  </section>

  <!-- SKILLS -->
  <section class="fade-in">
    <div class="section-title"><i class="fa-solid fa-code"></i> দক্ষতা (Skills)
      <button class="section-edit-btn" onclick="openSkillModal()"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="skills-wrap" id="skills-wrap"><div class="loader"><i class="fa-solid fa-spinner spin"></i> লোড হচ্ছে...</div></div>
  </section>

  <!-- PROJECTS -->
  <section class="fade-in">
    <div class="section-title"><i class="fa-solid fa-diagram-project"></i> প্রজেক্ট সমূহ
      <button class="section-edit-btn" onclick="openProjectModal()"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div id="projects-wrap"><div class="loader"><i class="fa-solid fa-spinner spin"></i> লোড হচ্ছে...</div></div>
  </section>

  <!-- EXPERIENCE -->
  <section class="fade-in">
    <div class="section-title"><i class="fa-solid fa-briefcase"></i> অভিজ্ঞতা
      <button class="section-edit-btn" onclick="openExpModal()"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="timeline" id="exp-wrap"><div class="loader"><i class="fa-solid fa-spinner spin"></i> লোড হচ্ছে...</div></div>
  </section>

  <!-- CONTACT -->
  <section class="fade-in" id="contact-section">
    <div class="section-title"><i class="fa-solid fa-envelope"></i> যোগাযোগ করুন</div>
    <div class="contact-form">
      <div class="form-group">
        <label>আপনার নাম</label>
        <input type="text" id="msg-name" placeholder="নাম লিখুন">
      </div>
      <div class="form-group">
        <label>ইমেইল</label>
        <input type="email" id="msg-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>মেসেজ</label>
        <textarea id="msg-text" rows="3" placeholder="আপনার মেসেজ লিখুন..."></textarea>
      </div>
      <button class="btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i> পাঠান</button>
    </div>
  </section>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="scrollToSection('hero-section',this)"><i class="fa-solid fa-house"></i>হোম</button>
  <button class="nav-item" onclick="scrollToSection('skills-wrap',this)"><i class="fa-solid fa-code"></i>স্কিল</button>
  <button class="nav-item" onclick="scrollToSection('projects-wrap',this)"><i class="fa-solid fa-diagram-project"></i>প্রজেক্ট</button>
  <button class="nav-item" onclick="scrollToSection('exp-wrap',this)"><i class="fa-solid fa-briefcase"></i>অভিজ্ঞতা</button>
  <button class="nav-item" onclick="scrollToSection('contact-section',this)"><i class="fa-solid fa-envelope"></i>যোগাযোগ</button>
</div>

<div class="toast" id="toast"></div>

<!-- ══ ADMIN LOGIN MODAL ══ -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal">
    <div class="modal-title">অ্যাডমিন লগইন <button class="modal-close" onclick="closeModal('admin-modal')"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="admin-email" placeholder="admin@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="admin-pass" placeholder="••••••••">
    </div>
    <button class="btn" onclick="adminLogin()"><i class="fa-solid fa-key"></i> লগইন</button>
  </div>
</div>

<!-- ══ PROFILE EDIT MODAL ══ -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <div class="modal-title">প্রোফাইল এডিট <button class="modal-close" onclick="closeModal('profile-modal')"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="form-group"><label>নাম</label><input type="text" id="pf-name"></div>
    <div class="form-group"><label>পদবি / Role</label><input type="text" id="pf-role" placeholder="e.g. Full Stack Developer"></div>
    <div class="form-group"><label>বায়ো</label><textarea id="pf-bio" rows="3"></textarea></div>
    <div class="form-group"><label>প্রোফাইল ছবি URL</label><input type="text" id="pf-avatar" placeholder="https://..."></div>
    <div class="form-group"><label>GitHub URL</label><input type="text" id="pf-github" placeholder="https://github.com/..."></div>
    <div class="form-group"><label>LinkedIn URL</label><input type="text" id="pf-linkedin" placeholder="https://linkedin.com/in/..."></div>
    <div class="form-group"><label>Facebook URL</label><input type="text" id="pf-facebook" placeholder="https://facebook.com/..."></div>
    <div class="form-group"><label>Twitter / X URL</label><input type="text" id="pf-twitter" placeholder="https://x.com/..."></div>
    <div class="form-group"><label>Email</label><input type="text" id="pf-email" placeholder="you@example.com"></div>
    <div class="form-group"><label>অভিজ্ঞতা (বছর)</label><input type="number" id="pf-exp" placeholder="e.g. 3"></div>
    <button class="btn" onclick="saveProfile()"><i class="fa-solid fa-floppy-disk"></i> সেভ করুন</button>
  </div>
</div>

<!-- ══ SKILL MODAL ══ -->
<div class="modal-overlay" id="skill-modal">
  <div class="modal">
    <div class="modal-title">নতুন স্কিল যুক্ত করুন <button class="modal-close" onclick="closeModal('skill-modal')"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="form-group"><label>স্কিলের নাম</label><input type="text" id="sk-name" placeholder="e.g. JavaScript"></div>

<script>
/* ══════════════════ FIREBASE CONFIG ══════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyA_vr4EXR57ap2CRxlS1JpK6wHqIwlU8Rc",
  authDomain: "devcard-6b634.firebaseapp.com",
  databaseURL: "https://devcard-6b634-default-rtdb.firebaseio.com",
  projectId: "devcard-6b634",
  storageBucket: "devcard-6b634.firebasestorage.app",
  messagingSenderId: "754891867884",
  appId: "1:754891867884:web:f6ff7e2f8d2fcf8ae147c9",
  measurementId: "G-C3P4HVH0C0"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let isAdmin = false;

/* ══════════════════ THEME ══════════════════ */
function toggleTheme(){
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('devcard-theme', next);
}
(function(){
  const saved = localStorage.getItem('devcard-theme');
  if(saved) document.documentElement.setAttribute('data-theme', saved);
})();

/* ══════════════════ TOAST ══════════════════ */
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ══════════════════ MODALS ══════════════════ */
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
function openModal(id){ document.getElementById(id).classList.add('show'); }

document.querySelectorAll('.modal-overlay').forEach(ov=>{
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('show'); });
});

/* ══════════════════ NAV SCROLL ══════════════════ */
function scrollToSection(id, btn){
  document.getElementById(id).scrollIntoView({behavior:'smooth', block:'start'});
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  btn.classList.add('active');
}

/* ══════════════════ ADMIN AUTH ══════════════════ */
const ADMIN_BTN = document.getElementById('admin-login-btn');

function openAdminModal(){
  if(isAdmin){ adminLogout(); return; }
  openModal('admin-modal');
}

function adminLogin(){
  const email = document.getElementById('admin-email').value.trim();
  const pass = document.getElementById('admin-pass').value;
  if(!email || !pass){ showToast('ইমেইল ও পাসওয়ার্ড দিন'); return; }
  auth.signInWithEmailAndPassword(email, pass)
    .then(()=>{
      closeModal('admin-modal');
      showToast('লগইন সফল ✅');
    })
    .catch(err=>{
      // If user doesn't exist yet, create it as first-time admin setup
      if(err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential'){
        auth.createUserWithEmailAndPassword(email, pass)
          .then(()=>{ closeModal('admin-modal'); showToast('অ্যাডমিন একাউন্ট তৈরি হয়েছে ✅'); })
          .catch(e2=>showToast('এরর: '+e2.message));
      } else {
        showToast('এরর: '+err.message);
      }
    });
}

function adminLogout(){
  auth.signOut().then(()=>showToast('লগআউট হয়েছে'));
}

auth.onAuthStateChanged(user=>{
  isAdmin = !!user;
  document.body.classList.toggle('admin-mode', isAdmin);
  document.getElementById('logout-fab').classList.toggle('show', isAdmin);
  ADMIN_BTN.innerHTML = isAdmin ? '<i class="fa-solid fa-lock-open"></i>' : '<i class="fa-solid fa-user-shield"></i>';
  ADMIN_BTN.title = isAdmin ? 'Admin mode (click to logout)' : 'Admin login';
});

/* ══════════════════ PROFILE ══════════════════ */
const profileRef = db.ref('profile');

profileRef.on('value', snap=>{
  const d = snap.val() || {};
  document.getElementById('hero-name').textContent = d.name || 'আপনার নাম';
  document.getElementById('hero-role').textContent = d.role || 'Your Role / Title';
  document.getElementById('hero-bio').textContent = d.bio || 'এডিট করে আপনার পরিচিতি লিখুন।';
  document.getElementById('stat-exp').textContent = (d.experience || 0) + '+';

  const avatarWrap = document.getElementById('avatar-wrap');
  avatarWrap.innerHTML = d.avatar
    ? `<img src="${escapeHtml(d.avatar)}" alt="avatar">`
    : `<i class="fa-solid fa-user"></i>`;

  const socials = [];
  if(d.github) socials.push({icon:'fa-brands fa-github', url:d.github});
  if(d.linkedin) socials.push({icon:'fa-brands fa-linkedin-in', url:d.linkedin});
  if(d.facebook) socials.push({icon:'fa-brands fa-facebook-f', url:d.facebook});
  if(d.twitter) socials.push({icon:'fa-brands fa-x-twitter', url:d.twitter});
  if(d.email) socials.push({icon:'fa-solid fa-envelope', url:'mailto:'+d.email});

  document.getElementById('hero-socials').innerHTML = socials.map(s=>
    `<a class="social-btn" href="${escapeAttr(s.url)}" target="_blank" rel="noopener"><i class="${s.icon}"></i></a>`
  ).join('') || '<span style="font-family:\'Space Mono\',monospace;font-size:.6rem;color:var(--text3);">সোশ্যাল লিংক যুক্ত করুন</span>';

  // store for edit modal
  window._profileData = d;
});

function openProfileEditModal(){
  if(!isAdmin){ showToast('অ্যাডমিন লগইন করুন প্রথমে'); return; }
  const d = window._profileData || {};
  document.getElementById('pf-name').value = d.name || '';
  document.getElementById('pf-role').value = d.role || '';
  document.getElementById('pf-bio').value = d.bio || '';
  document.getElementById('pf-avatar').value = d.avatar || '';
  document.getElementById('pf-github').value = d.github || '';
  document.getElementById('pf-linkedin').value = d.linkedin || '';
  document.getElementById('pf-facebook').value = d.facebook || '';
  document.getElementById('pf-twitter').value = d.twitter || '';
  document.getElementById('pf-email').value = d.email || '';
  document.getElementById('pf-exp').value = d.experience || '';
  openModal('profile-modal');
}

function saveProfile(){
  const data = {
    name: document.getElementById('pf-name').value.trim(),
    role: document.getElementById('pf-role').value.trim(),
    bio: document.getElementById('pf-bio').value.trim(),
    avatar: document.getElementById('pf-avatar').value.trim(),
    github: document.getElementById('pf-github').value.trim(),
    linkedin: document.getElementById('pf-linkedin').value.trim(),
    facebook: document.getElementById('pf-facebook').value.trim(),
    twitter: document.getElementById('pf-twitter').value.trim(),
    email: document.getElementById('pf-email').value.trim(),
    experience: parseInt(document.getElementById('pf-exp').value) || 0
  };
  profileRef.set(data)
    .then(()=>{ closeModal('profile-modal'); showToast('প্রোফাইল সেভ হয়েছে ✅'); })
    .catch(e=>showToast('এরর: '+e.message));
}

/* ══════════════════ SKILLS ══════════════════ */
const skillsRef = db.ref('skills');

skillsRef.on('value', snap=>{
  const wrap = document.getElementById('skills-wrap');
  const items = snap.val();
  if(!items){
    wrap.innerHTML = `<div class="empty-state">কোনো স্কিল যুক্ত করা হয়নি</div>`;
    document.getElementById('stat-skills').textContent = '0';
    return;
  }
  const keys = Object.keys(items);
  document.getElementById('stat-skills').textContent = keys.length;
  wrap.innerHTML = keys.map(k=>{
    const s = items[k];
    return `<div class="skill-chip">
      <span>${escapeHtml(s.name)}</span>
      <div class="lvl-bar"><div class="lvl-fill" style="width:${s.level||50}%"></div></div>
      <span style="color:var(--text3);font-size:.6rem;">${s.level||50}%</span>
      ${isAdmin ? `<button onclick="deleteSkill('${k}')" style="background:none;border:none;color:var(--text3);cursor:pointer;margin-left:4px;"><i class="fa-solid fa-xmark"></i></button>` : ''}
    </div>`;
  }).join('');
});

function openSkillModal(){
  if(!isAdmin){ showToast('অ্যাডমিন লগইন করুন প্রথমে'); return; }
  document.getElementById('sk-name').value = '';
  document.getElementById('sk-level').value = '';
  openModal('skill-modal');
}

function addSkill(){
  const name = document.getElementById('sk-name').value.trim();
  const level = Math.max(0, Math.min(100, parseInt(document.getElementById('sk-level').value) || 50));
  if(!name){ showToast('স্কিলের নাম দিন'); return; }
  skillsRef.push({name, level})
    .then(()=>{ closeModal('skill-modal'); showToast('স্কিল যুক্ত হয়েছে ✅'); })
    .catch(e=>showToast('এরর: '+e.message));
}

function deleteSkill(key){
  if(!confirm('এই স্কিল ডিলিট করবেন?')) return;
  skillsRef.child(key).remove().then(()=>showToast('ডিলিট হয়েছে'));
}

/* ══════════════════ PROJECTS ══════════════════ */
const projectsRef = db.ref('projects');

projectsRef.on('value', snap=>{
  const wrap = document.getElementById('projects-wrap');
  const items = snap.val();
  if(!items){
    wrap.innerHTML = `<div class="empty-state">কোনো প্রজেক্ট যুক্ত করা হয়নি</div>`;
    document.getElementById('stat-projects').textContent = '0';
    return;
  }
  const keys = Object.keys(items);
  document.getElementById('stat-projects').textContent = keys.length;
  wrap.innerHTML = keys.map(k=>{
    const p = items[k];
    const tags = (p.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    return `<div class="project-card fade-in">
      ${p.image ? `<img class="project-img" src="${escapeHtml(p.image)}" alt="${escapeAttr(p.title)}">` : `<div class="project-img-placeholder"><i class="fa-solid fa-image"></i></div>`}
      <div class="project-body">
        <div class="project-title">${escapeHtml(p.title)}</div>
        <div class="project-desc">${escapeHtml(p.desc||'')}</div>
        ${tags.length ? `<div class="project-tags">${tags.map(t=>`<span class="project-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
        <div class="project-links">
          ${p.demo ? `<a class="proj-link primary" href="${escapeAttr(p.demo)}" target="_blank" rel="noopener"><i class="fa-solid fa-arrow-up-right-from-square"></i> Live Demo</a>` : ''}
          ${p.code ? `<a class="proj-link" href="${escapeAttr(p.code)}" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i> Code</a>` : ''}
        </div>
        <div class="item-actions">
          <button onclick="editProject('${k}')"><i class="fa-solid fa-pen"></i> এডিট</button>
          <button class="del" onclick="deleteProject('${k}')"><i class="fa-solid fa-trash"></i> ডিলিট</button>
        </div>
      </div>
    </div>`;
  }).join('');
});

let _projectsCache = {};
projectsRef.on('value', snap=>{ _projectsCache = snap.val() || {}; });

function openProjectModal(){
  if(!isAdmin){ showToast('অ্যাডমিন লগইন করুন প্রথমে'); return; }
  document.getElementById('pr-id').value = '';
  document.getElementById('pr-title').value = '';
  document.getElementById('pr-desc').value = '';
  document.getElementById('pr-image').value = '';
  document.getElementById('pr-tags').value = '';
  document.getElementById('pr-demo').value = '';
  document.getElementById('pr-code').value = '';
  openModal('project-modal');
}

function editProject(key){
  if(!isAdmin) return;
  const p = _projectsCache[key];
  if(!p) return;
  document.getElementById('pr-id').value = key;
  document.getElementById('pr-title').value = p.title || '';
  document.getElementById('pr-desc').value = p.desc || '';
  document.getElementById('pr-image').value = p.image || '';
  document.getElementById('pr-tags').value = p.tags || '';
  document.getElementById('pr-demo').value = p.demo || '';
  document.getElementById('pr-code').value = p.code || '';
  openModal('project-modal');
}

function saveProject(){
  const id = document.getElementById('pr-id').value;
  const data = {
    title: document.getElementById('pr-title').value.trim(),
    desc: document.getElementById('pr-desc').value.trim(),
    image: document.getElementById('pr-image').value.trim(),
    tags: document.getElementById('pr-tags').value.trim(),
    demo: document.getElementById('pr-demo').value.trim(),
    code: document.getElementById('pr-code').value.trim()
  };
  if(!data.title){ showToast('প্রজেক্ট টাইটেল দিন'); return; }
  const ref = id ? projectsRef.child(id) : projectsRef.push();
  ref.set(data)
    .then(()=>{ closeModal('project-modal'); showToast('প্রজেক্ট সেভ হয়েছে ✅'); })
    .catch(e=>showToast('এরর: '+e.message));
}

function deleteProject(key){
  if(!confirm('এই প্রজেক্ট ডিলিট করবেন?')) return;
  projectsRef.child(key).remove().then(()=>showToast('ডিলিট হয়েছে'));
}

/* ══════════════════ EXPERIENCE ══════════════════ */
const expRef = db.ref('experience');
let _expCache = {};

expRef.on('value', snap=>{
  const wrap = document.getElementById('exp-wrap');
  const items = snap.val();
  _expCache = items || {};
  if(!items){
    wrap.innerHTML = `<div class="empty-state">কোনো অভিজ্ঞতা যুক্ত করা হয়নি</div>`;
    return;
  }
  // sort by order added (keys), most recent first if there's a date field — just reverse insertion order
  const keys = Object.keys(items).reverse();
  wrap.innerHTML = keys.map(k=>{
    const e = items[k];
    return `<div class="tl-item fade-in">
      <div class="tl-role">${escapeHtml(e.role)}</div>
      <div class="tl-org">${escapeHtml(e.org||'')}</div>
      <div class="tl-date">${escapeHtml(e.date||'')}</div>
      <div class="tl-desc">${escapeHtml(e.desc||'')}</div>
      <div class="item-actions">
        <button onclick="editExp('${k}')"><i class="fa-solid fa-pen"></i> এডিট</button>
        <button class="del" onclick="deleteExp('${k}')"><i class="fa-solid fa-trash"></i> ডিলিট</button>
      </div>
    </div>`;
  }).join('');
});

function openExpModal(){
  if(!isAdmin){ showToast('অ্যাডমিন লগইন করুন প্রথমে'); return; }
  document.getElementById('ex-id').value = '';
  document.getElementById('ex-role').value = '';
  document.getElementById('ex-org').value = '';
  document.getElementById('ex-date').value = '';
  document.getElementById('ex-desc').value = '';
  openModal('exp-modal');
}

function editExp(key){
  if(!isAdmin) return;
  const e = _expCache[key];
  if(!e) return;
  document.getElementById('ex-id').value = key;
  document.getElementById('ex-role').value = e.role || '';
  document.getElementById('ex-org').value = e.org || '';
  document.getElementById('ex-date').value = e.date || '';
  document.getElementById('ex-desc').value = e.desc || '';
  openModal('exp-modal');
}

function saveExp(){
  const id = document.getElementById('ex-id').value;
  const data = {
    role: document.getElementById('ex-role').value.trim(),
    org: document.getElementById('ex-org').value.trim(),
    date: document.getElementById('ex-date').value.trim(),
    desc: document.getElementById('ex-desc').value.trim()
  };
  if(!data.role){ showToast('পদবি দিন'); return; }
  const ref = id ? expRef.child(id) : expRef.push();
  ref.set(data)
    .then(()=>{ closeModal('exp-modal'); showToast('সেভ হয়েছে ✅'); })
    .catch(e=>showToast('এরর: '+e.message));
}

function deleteExp(key){
  if(!confirm('এই অভিজ্ঞতা ডিলিট করবেন?')) return;
  expRef.child(key).remove().then(()=>showToast('ডিলিট হয়েছে'));
}

/* ══════════════════ CONTACT MESSAGES ══════════════════ */
function sendMessage(){
  const name = document.getElementById('msg-name').value.trim();
  const email = document.getElementById('msg-email').value.trim();
  const text = document.getElementById('msg-text').value.trim();
  if(!name || !email || !text){ showToast('সব ফিল্ড পূরণ করুন'); return; }
  db.ref('messages').push({
    name, email, text, time: new Date().toISOString()
  }).then(()=>{
    showToast('মেসেজ পাঠানো হয়েছে ✅');
    document.getElementById('msg-name').value = '';
    document.getElementById('msg-email').value = '';
    document.getElementById('msg-text').value = '';
  }).catch(e=>showToast('এরর: '+e.message));
}

/* ══════════════════ UTILS ══════════════════ */
function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }
</script>
